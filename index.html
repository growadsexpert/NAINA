<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Prediction Access</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

/* Background Overlay */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e') no-repeat center/cover;
    filter: blur(6px) brightness(0.4);
    z-index: -1;
}

/* Container */
.container {
    padding: 20px;
}

/* Heading */
h1 {
    font-size: 30px;
    margin-top: 40px;
    color: #00ffcc;
}

p {
    font-size: 16px;
    opacity: 0.85;
}

/* Card */
.card {
    background: rgba(0,0,0,0.7);
    padding: 20px;
    border-radius: 15px;
    margin-top: 25px;
    box-shadow: 0 0 20px rgba(0,255,204,0.3);
}

/* Button */
.join-btn {
    display: block;
    margin: 20px auto;
    padding: 15px;
    width: 90%;
    max-width: 300px;
    background: linear-gradient(45deg, #00ffcc, #00cc99);
    color: #000;
    font-weight: bold;
    border-radius: 50px;
    text-decoration: none;
    font-size: 18px;
    transition: 0.3s;
}

.join-btn:hover {
    transform: scale(1.05);
}

/* Live Counter */
.counter {
    margin-top: 10px;
    font-size: 18px;
    color: #00ffcc;
}

/* Popup */
.popup {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: #111;
    padding: 10px 15px;
    border-radius: 10px;
    font-size: 14px;
    display: none;
}

/* Footer */
.footer {
    margin-top: 30px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

    <h1>🔥 NAINA Cricket Prediction 🔥</h1>
    <p>Join Now & Get Daily Winning Tips 🏏</p>

    <div class="card">

        <div class="counter">
            🔥 <span id="count">1325</span> People Joined Today
        </div>

        <a href="https://t.me/+6dyv15kElhQ2MDg1" class="join-btn">
            👉 JOIN TELEGRAM NOW
        </a>

        <p>✔ 50K+ Members<br>
           ✔ 98% Accuracy<br>
           ✔ Daily Profit Tips</p>

    </div>

    <div class="footer">
        ⚠️ This platform is for informational purposes only
    </div>

</div>

<!-- Popup Notification -->
<div class="popup" id="popup"></div>

<script>
// Counter
let count = 1325;
setInterval(() => {
    count += Math.floor(Math.random() * 4) + 1;
    document.getElementById("count").innerText = count;
}, 3000);

// Fake Join Popup
let names = ["Rahul", "Aman", "Suresh", "Vikas", "Rohit", "Ankit"];
setInterval(() => {
    let name = names[Math.floor(Math.random() * names.length)];
    let popup = document.getElementById("popup");
    popup.innerText = name + " joined just now";
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 2000);
}, 5000);
</script>

</body>
</html>
